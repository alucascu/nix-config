# Hostname Reference
# pantheon -> realm -> host (god)

# ── Pantheons ──────────────────────────────────────────────────────────────────

[pantheons.norse]
type = "vm"
description = "Nine worlds hanging from Yggdrasil, the world-tree"

[pantheons.greek]
type = "physical"
description = "Realms of Greek cosmology, from Olympus to the primordial void"

[pantheons.roman]
type = "container"
description = "The seven hills of Rome and their civic gods"

[pantheons.egyptian]
type = "cloud"
description = "Cosmic order and the sun's nightly journey through the underworld"

[pantheons.mesopotamian]
type = "network"
description = "Oldest written mythology, gods of fundamental forces"

